<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
</head>
<body>
    <div class="container">
        
        <div class="nav">
            <div class="logo">
                <img src="./images/view-dashboard.svg" alt="Dashboard Icon" width="50px" height="auto">
                Dashboard
            </div>
            <div class="links">
                <ul class="general">
                    <li><img src="./images/home.svg" width="25" height="auto"> Home</li>
                    <li><img src="./images/card-account-details.svg" width="25" height="auto"> Profile</li>
                    <li><img src="./images/message-reply.svg" width="25" height="auto"> Messages</li>
                    <li><img src="./images/history.svg" width="25" height="auto"> History</li>
                    <li><img src="./images/file-multiple.svg" width="25" height="auto"> Tasks</li>
                    <li><img src="./images/account-group.svg" width="25" height="auto"> Community</li>
                </ul>

                <ul class="preferences">
                    <li><img src="./images/cog.svg" width="25" height="auto"> Settings</li>
                    <li><img src="./images/help-box.svg" width="25" height="auto"> Support</li>
                    <li><img src="./images/shield-check.svg" width="25" height="auto"> Privacy</li>
                </ul>
            </div>
        </div>

        <div class="main">
            
        </div>

    </div>
